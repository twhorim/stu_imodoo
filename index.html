<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-card border border-gray-200 rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-blue-600 p-8 text-white text-center">
            <h1 class="text-2xl font-bold mb-2">문태고등학교</h1>

        </div>

        <!-- Form Section -->
        <div class="p-8 space-y-5">
            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-500 ml-1">학년</label>
                    <input type="number" id="grade" placeholder="1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center text-lg">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-500 ml-1">반</label>
                    <input type="number" id="class" placeholder="1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center text-lg">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-500 ml-1">번호</label>
                    <input type="number" id="number" placeholder="1" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-center text-lg">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-semibold text-gray-500 ml-1">이름</label>
                <input type="text" id="name" placeholder="이름을 입력하세요" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg">
            </div>

            <button onclick="searchAccount()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-95 flex items-center justify-center space-x-2">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>계정 정보 찾기</span>
            </button>
        </div>

        <!-- Result Section (Hidden by default) -->
        <div id="resultBox" class="hidden px-8 pb-8 animate-fade-in-up">
            <hr class="mb-6 border-gray-100">
            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 space-y-4">
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">아이디</span>
                        <button onclick="copyToClipboard()" class="text-[10px] bg-blue-200 text-blue-700 px-2 py-1 rounded hover:bg-blue-300 transition-colors">복사하기</button>
                    </div>
                    <div id="resId" class="text-lg font-bold text-gray-800 break-all select-all"></div>
                </div>
                <div>
                    <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">최초 비밀번호</span>
                    <div id="resPw" class="text-lg font-bold text-gray-800 tracking-widest"></div>
                </div>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-4 italic">* 로그인 후 반드시 비밀번호를 변경해 주세요.</p>
        </div>

        <!-- Message Box -->
        <div id="messageBox" class="hidden px-8 pb-8 text-center text-red-500 font-medium text-sm"></div>
    </div>

        // 데이터 파싱
        const students = [];
        const lines = rawData.trim().split('\n');
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(',');
            students.push({
                grade: cols[2],
                class: cols[3],
                num: cols[4],
                name: cols[5].trim(),
                id: cols[6],
                pw: cols[7]
            });
        }

        function searchAccount() {
            const g = document.getElementById('grade').value;
            const c = document.getElementById('class').value;
            const n = document.getElementById('number').value;
            const name = document.getElementById('name').value.trim();

            const resultBox = document.getElementById('resultBox');
            const messageBox = document.getElementById('messageBox');
            const resId = document.getElementById('resId');
            const resPw = document.getElementById('resPw');

            if (!g || !c || !n || !name) {
                showMessage("모든 정보를 정확히 입력해 주세요.");
                return;
            }

            const student = students.find(s => 
                s.grade == g && s.class == c && s.num == n && s.name === name
            );

            if (student) {
                messageBox.classList.add('hidden');
                resultBox.classList.remove('hidden');
                resId.innerText = student.id;
                resPw.innerText = student.pw;
                resultBox.scrollIntoView({ behavior: 'smooth' });
            } else {
                resultBox.classList.add('hidden');
                showMessage("일치하는 정보가 없습니다. 다시 확인해 주세요.");
            }
        }

        function showMessage(msg) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerText = msg;
            messageBox.classList.remove('hidden');
        }

        function copyToClipboard() {
            const idText = document.getElementById('resId').innerText;
            const tempInput = document.createElement("input");
            tempInput.value = idText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            const copyBtn = document.querySelector('button[onclick="copyToClipboard()"]');
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "복사됨!";
            copyBtn.classList.replace('bg-blue-200', 'bg-green-500');
            copyBtn.classList.replace('text-blue-700', 'text-white');
            
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.classList.replace('bg-green-500', 'bg-blue-200');
                copyBtn.classList.replace('text-white', 'text-blue-700');
            }, 2000);
        }
